# Production stack — hardened for the influencer surge (target ~10-20K DM/min).
#
# Topology:
#   Caddy(host) ── /webhook* ──► web_webhook  :8001  (gthread 4x4, t/o 10)
#               ── /api,/admin ► web_dashboard :8002  (gthread 12x4, t/o 30)
#               ── external-IO ► web_external  :8003  (gthread 4x16, t/o 30)
#   app ──► pgbouncer:6432 (transaction pool) ──► db:5432
#   celery: dm (threads) / followup (threads) / default (prefork) / billing (prefork) / beat
#
# Migrations are GATED (RUN_MIGRATIONS not set here) — deploy.sh runs them once.
# Rollback: redeploy main (checkpoint) compose, or set APP_IMAGE to the previous tag. See deploy/scripts/.

x-app-image: &app_image "${APP_IMAGE:-turnflow_instagram_web:latest}"

x-app-env: &app_env
  DJANGO_SETTINGS_MODULE: config.settings.prod
  DB_HOST: pgbouncer          # app talks to PgBouncer, NOT db directly
  DB_PORT: "6432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"

# 로그 로테이션(#7) — 기본 json-file 무제한 증가로 /var/lib/docker 가 차면 전 컨테이너 쓰기 정지.
x-logging: &default_logging
  driver: json-file
  options: { max-size: "50m", max-file: "5" }

# 파일 디스크립터 상한(#2) — celery_dm(100 threads)/web_external(64 threads) 등 고동시성에서
# 기본 nofile=1024 로는 DM 버스트 시 EMFILE('too many open files')로 조용히 실패(OOM/재시작 신호에 안 잡힘).
x-ulimits: &default_ulimits
  nofile: { soft: 65535, hard: 65535 }

services:
  db:
    # stock postgres:16-alpine + pgBackRest baked in (DR / WAL PITR). See deploy/backups/Dockerfile.db.
    # The `image:` tag caches the build so it only rebuilds when the Dockerfile/apk layer changes.
    build:
      context: ./deploy/backups
      dockerfile: Dockerfile.db
    image: turnflow_instagram_db_pgbackrest:16
    container_name: turnflow_instagram_db
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    # PG tuning + reduced max_connections (PgBouncer multiplexes, so 300 is ample).
    # NOTE: changing this command recreates db (one restart) — do it in a maintenance window.
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=8GB
      -c effective_cache_size=24GB
      -c work_mem=32MB
      -c maintenance_work_mem=512MB
      -c wal_buffers=64MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_NAME:-instagram_service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - turnflow_instagram_postgres:/var/lib/postgresql/data
      # pgBackRest config (gitignored, filled on server from pgbackrest.conf.example) + log dir.
      # The conf file MUST exist on the host before `up`, else Docker creates a dir there.
      - ./deploy/backups/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - turnflow_instagram_pgbackrest_log:/var/log/pgbackrest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "16", memory: 48G }
    networks:
      - turnflow_instagram_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: turnflow_instagram_pgbouncer
    ports:
      - "127.0.0.1:6432:6432"   # netdata(host-net)의 SHOW POOLS 스크레이프용(#6 pgbouncer 관측). 루프백 전용, 외부 미노출.
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-instagram_service}
      POOL_MODE: transaction          # required for high client counts; Django uses DISABLE_SERVER_SIDE_CURSORS
      MAX_CLIENT_CONN: "2000"         # web threads + celery threads connect here
      DEFAULT_POOL_SIZE: "40"         # actual server-side conns to db (well under max_connections=300)
      MIN_POOL_SIZE: "10"
      RESERVE_POOL_SIZE: "10"
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${DB_USER:-postgres} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "2", memory: 512M }
    networks:
      - turnflow_instagram_net

  redis:
    image: redis:7-alpine
    container_name: turnflow_instagram_redis
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    # noeviction (NOT allkeys-lru): redis is the Celery broker (/0); evicting keys would drop queued tasks.
    # maxmemory is a host-OOM guard only.
    command: redis-server --appendonly yes --maxmemory 8gb --maxmemory-policy noeviction
    volumes:
      - turnflow_instagram_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: { cpus: "4", memory: 10G }
    networks:
      - turnflow_instagram_net

  # ── Tier 1: webhook (fast, fail-fast; just EventInbox insert + enqueue) ──
  web_webhook:
    build: { context: ., dockerfile: Dockerfile }
    image: *app_image
    container_name: turnflow_instagram_web_webhook
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: >
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      --worker-class gthread --workers 4 --threads 4
      --timeout 10 --graceful-timeout 5 --keep-alive 5 --backlog 512
      --max-requests 5000 --max-requests-jitter 500
      --worker-tmp-dir /dev/shm
      --access-logfile - --error-logfile -
    env_file: [.env.production]
    environment: *app_env
    ports:
      # Caddy(컨테이너)는 네트워크 DNS(web_webhook:8000)로 접속 — 이 포트는 호스트 디버깅/스모크 테스트용.
      - "127.0.0.1:8001:8000"
    volumes:
      - turnflow_instagram_static:/app/staticfiles
      - turnflow_instagram_media:/app/media
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthz',timeout=4).status==200 else 1)\""]
      interval: 15s
      timeout: 6s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "4", memory: 4G }
    networks:
      - turnflow_instagram_net

  # ── Tier 2: dashboard / API ──
  web_dashboard:
    image: *app_image
    container_name: turnflow_instagram_web_dashboard
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: >
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      --worker-class gthread --workers 12 --threads 4
      --timeout 30 --graceful-timeout 30 --keep-alive 5 --backlog 512
      --max-requests 5000 --max-requests-jitter 500
      --worker-tmp-dir /dev/shm
      --access-logfile - --error-logfile -
    env_file: [.env.production]
    environment: *app_env
    ports:
      - "127.0.0.1:8002:8000"   # 호스트 디버깅용 (Caddy 는 web_dashboard:8000 으로 접속)
    volumes:
      - turnflow_instagram_static:/app/staticfiles
      - turnflow_instagram_media:/app/media
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthz',timeout=4).status==200 else 1)\""]
      interval: 15s
      timeout: 6s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "12", memory: 12G }
    networks:
      - turnflow_instagram_net

  # ── Tier 3: external-IO isolation (link_meta, Graph proxy, importers, dev test endpoints) ──
  web_external:
    image: *app_image
    container_name: turnflow_instagram_web_external
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: >
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      --worker-class gthread --workers 4 --threads 16
      --timeout 30 --graceful-timeout 15 --keep-alive 5 --backlog 256
      --max-requests 2000 --max-requests-jitter 200
      --worker-tmp-dir /dev/shm
      --access-logfile - --error-logfile -
    env_file: [.env.production]
    environment: *app_env
    ports:
      - "127.0.0.1:8003:8000"   # 호스트 디버깅용 (Caddy 는 web_external:8000 으로 접속)
    volumes:
      - turnflow_instagram_static:/app/staticfiles
      - turnflow_instagram_media:/app/media
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthz',timeout=4).status==200 else 1)\""]
      interval: 15s
      timeout: 6s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "4", memory: 6G }
    networks:
      - turnflow_instagram_net

  # ── Celery: DM send (I/O-bound → threads pool; high concurrency for ~333 DM/s) ──
  # Scale horizontally: docker compose -f docker-compose.prod.yml up -d --scale celery_dm=3
  celery_dm:
    image: *app_image
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: celery -A config worker --pool=threads --concurrency=100 --prefetch-multiplier=1 -l info -Q dm_send
    env_file: [.env.production]
    environment: *app_env
    volumes:
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "6", memory: 8G }
    networks:
      - turnflow_instagram_net

  # ── Celery: webhook follow-up (delivered/read UPDATEs) + verification (I/O-bound) ──
  celery_followup:
    image: *app_image
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: celery -A config worker --pool=threads --concurrency=80 --prefetch-multiplier=1 -l info -Q webhook_followup,verify
    env_file: [.env.production]
    environment: *app_env
    volumes:
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "4", memory: 6G }
    networks:
      - turnflow_instagram_net

  # ── Celery: default + snapshot (Playwright is heavy → prefork, low concurrency, isolated) ──
  celery_default:
    image: *app_image
    container_name: turnflow_instagram_celery
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    shm_size: "1gb"   # Playwright/Chromium 스냅샷용(#1; 코드도 --disable-dev-shm-usage 사용 — 이중 방어)
    command: celery -A config worker --concurrency=8 --prefetch-multiplier=1 -l info -Q celery,snapshot
    env_file: [.env.production]
    environment: *app_env
    volumes:
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "8", memory: 12G }
    networks:
      - turnflow_instagram_net

  # ── Celery: AI 작업 격리(#5) — run_ai_job(최대 600s LLM)·campaign-assist 를 snapshot/DM-reconcile 가
  #    도는 celery_default 8슬롯에서 분리(head-of-line blocking 방지). 라우팅: apps.ai_jobs.tasks.* → ai_jobs.
  celery_ai:
    image: *app_image
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    shm_size: "1gb"   # AI_VISUAL_REFINE 켜질 경우 run_ai_job 이 Chromium 렌더 → shm 여유 확보
    command: celery -A config worker --concurrency=4 --prefetch-multiplier=1 -l info -Q ai_jobs
    env_file: [.env.production]
    environment: *app_env
    volumes:
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "6", memory: 10G }
    networks:
      - turnflow_instagram_net

  # ── Celery: billing batches + backup health-check (low rate, isolated) ──
  celery_billing:
    image: *app_image
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: celery -A config worker --concurrency=4 --prefetch-multiplier=1 -l info -Q billing
    env_file: [.env.production]
    environment: *app_env
    volumes:
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "2", memory: 4G }
    networks:
      - turnflow_instagram_net

  # ⚠️ RETIRED — 스케줄링은 외부 cron → POST /api/v1/internal/scheduler/tick (DR §6, Step 2)으로 이관됨.
  # beat 와 tick 동시 가동 = 이중 발사이므로 평상시 기동하지 않는다(`profiles: [fallback]` → 기본 up 제외).
  # 긴급 폴백(외부 cron 전면 장애 시): docker compose --profile fallback up -d celery_beat
  # (단, 그 전에 외부 cron 을 반드시 멈춰 이중 발사 방지.)
  celery_beat:
    image: *app_image
    container_name: turnflow_instagram_celery_beat
    profiles: ["fallback"]
    restart: unless-stopped
    init: true
    logging: *default_logging
    ulimits: *default_ulimits
    command: celery -A config beat -l info --pidfile=/tmp/celerybeat.pid
    env_file: [.env.production]
    environment: *app_env
    volumes:
      - turnflow_instagram_logs:/app/logs
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "1", memory: 1G }
    networks:
      - turnflow_instagram_net

volumes:
  turnflow_instagram_postgres:
  turnflow_instagram_redis:
  turnflow_instagram_static:
  turnflow_instagram_media:
  turnflow_instagram_logs:
  turnflow_instagram_pgbackrest_log:

networks:
  turnflow_instagram_net:
    name: turnflow_instagram_net
    driver: bridge
