# P4c — host kernel tuning for the surge. Install + apply:
#   sudo cp deploy/os-tuning/99-turnflow.conf /etc/sysctl.d/99-turnflow.conf
#   sudo sysctl --system
# Rollback: rm the file, sudo sysctl --system.
#
# WHY: gunicorn backlog (512) is silently capped at net.core.somaxconn — without raising it,
# the accept queue truncates. tcp_tw_reuse + a wide local port range prevent ephemeral-port
# exhaustion at ~333 new outbound TLS connections/sec (DM sends to Meta).

net.core.somaxconn = 1024
net.ipv4.tcp_max_syn_backlog = 4096
net.core.netdev_max_backlog = 5000
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.ip_local_port_range = 10240 65535
vm.swappiness = 10
fs.file-max = 1048576
