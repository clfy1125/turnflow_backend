# /root/vllm-server/docker-compose.yml
#
# 변경점 (DeepSeek 도입):
#   - litellm 서비스에 env_file: .env 추가 → DEEPSEEK_API_KEY 주입
#
# 기존 그대로:
#   - vllm: H100 한 대 점유 + Gemma-4 FP8
#   - db: LiteLLM 메타DB
#   - 외부 노출은 litellm-proxy:4000 만 (Caddy 가 llm.clfy.ai.kr 로 프록시)

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: gemma-vllm
    runtime: nvidia
    ipc: host
    # 자원 상한 — 런타임 폭주/누수가 호스트를 잠식해 turnflow 스택을 굶기는 것 방지.
    # host RAM 실측 peak 9.7GiB(2.5개월) → 32g 는 3.3x 여유(정상 추론 무영향, 폭주만 차단).
    # 실제 제약은 GPU VRAM(H100, gpu-memory-utilization 0.95)이라 host RAM cap 은 안전.
    # 운영엔 무중단 docker update 로 선반영(2026-07-06); 이 블록은 다음 recreate/재부팅 대비 영속화.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: 32g
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8088:8000"
    environment:
      - VLLM_USE_TRITON_FLASH_ATTN=0
      - TORCH_COMPILE_DISABLE=True
      # 캐시된 모델만 사용 · HF API 미접촉 — 콜드스타트 시 huggingface 429(rate limit)로
      # 모델 메타 조회가 실패해 재시작 루프에 빠지는 것 방지(2026-07-06 재부팅 때 실측).
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    entrypoint: /bin/sh -c "pip install --upgrade 'transformers<5' && python3 -m vllm.entrypoints.openai.api_server --host 0.0.0.0 --port 8000 --model RedHatAI/gemma-4-31B-it-FP8-block --tensor-parallel-size 1 --gpu-memory-utilization 0.95 --max-model-len 65536 --kv-cache-dtype fp8 --max-num-seqs 16 --max-num-batched-tokens 16384 --enable-prefix-caching --enforce-eager --trust-remote-code --tool-call-parser gemma4 --reasoning-parser gemma4"
    networks:
      - default
      - turnflow_instagram_net

  db:
    image: postgres:15
    container_name: litellm-db
    restart: always
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm_user
      POSTGRES_PASSWORD: strong_password123
    volumes:
      - litellm_data:/var/lib/postgresql/data
    networks:
      - default

  litellm:
    # ⚠️ main-stable 은 '움직이는 태그' — CPU-spin 회귀 빌드로 자동 갱신될 수 있음(62코어 폭주 사례).
    #    정상 동작하던 릴리스로 핀 권장: ghcr.io/berriai/litellm:vX.Y.Z-stable
    #    (확인: docker images ghcr.io/berriai/litellm / github.com/BerriAI/litellm/releases)
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-proxy
    restart: unless-stopped
    # CPU/메모리 상한 — 버그난 빌드가 호스트 전체를 잡아먹어 turnflow 스택을 굶기는 것 방지.
    # (docker compose v2 는 up 시 deploy.resources.limits 를 적용한다)
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    depends_on:
      - vllm
      - db
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    # ⬇️ 추가: DEEPSEEK_API_KEY 등 외부 프로바이더 키를 .env 에서 주입
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://litellm_user:strong_password123@db:5432/litellm
      - LITELLM_MASTER_KEY=sk-master-key-admin1234
    command:
      - "--config=/app/config.yaml"
    ports:
      - "4040:4000"
    networks:
      - default
      - turnflow_instagram_net

volumes:
  litellm_data:

networks:
  default:
  turnflow_instagram_net:
    external: true
