# Observability stack (P5-obs) — run ALONGSIDE the app stack:
#   docker compose -f docker-compose.prod.yml -f deploy/observability/docker-compose.obs.yml --env-file .env.production up -d
# Joins the app network so exporters can reach db/redis. Bind all UIs to 127.0.0.1 + put behind Caddy basic-auth.
#
# Covers the metrics the surge needs to watch: bandwidth (node_exporter), DB writes/conns/locks
# (postgres_exporter), Celery queue lag (flower + redis_exporter), container CPU/RAM (cadvisor).

services:
  flower:
    image: mher/flower:2.0
    container_name: turnflow_flower
    restart: unless-stopped
    command: celery --broker=redis://redis:6379/0 flower --port=5555 --persistent=True
    ports: ["127.0.0.1:5555:5555"]
    depends_on: [redis]
    networks: [turnflow_instagram_net]

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: turnflow_node_exporter
    restart: unless-stopped
    command: ["--path.rootfs=/host"]
    pid: host
    volumes: ["/:/host:ro,rslave"]
    ports: ["127.0.0.1:9100:9100"]
    networks: [turnflow_instagram_net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: turnflow_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports: ["127.0.0.1:8080:8080"]
    networks: [turnflow_instagram_net]

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: turnflow_pg_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-instagram_service}?sslmode=disable"
    ports: ["127.0.0.1:9187:9187"]
    depends_on: [db]
    networks: [turnflow_instagram_net]

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: turnflow_redis_exporter
    restart: unless-stopped
    command: ["--redis.addr=redis://redis:6379"]
    ports: ["127.0.0.1:9121:9121"]
    depends_on: [redis]
    networks: [turnflow_instagram_net]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: turnflow_prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - turnflow_prometheus_data:/prometheus
    ports: ["127.0.0.1:9090:9090"]
    networks: [turnflow_instagram_net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: turnflow_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: https://metrics.turnflow.clfy.ai.kr
    volumes:
      - turnflow_grafana_data:/var/lib/grafana
    ports: ["127.0.0.1:3001:3000"]
    depends_on: [prometheus]
    networks: [turnflow_instagram_net]

volumes:
  turnflow_prometheus_data:
  turnflow_grafana_data:

networks:
  turnflow_instagram_net:
    external: true
    name: turnflow_instagram_net
