# GATE-0 / Layer 2 — append to the Postgres config to enable WAL archiving for PITR.
# This is the ONLY backup step that needs a Postgres restart. 4-line revert = clean rollback.
#
# Apply (server, in a quiet maintenance window):
#   1) pgbackrest --stanza=turnflow stanza-create
#   2) add these lines (mount this file or append to the container's postgresql.conf)
#   3) restart only the db container:  docker compose -f docker-compose.prod.yml restart db
#   4) pgbackrest --stanza=turnflow --type=full backup     # base backup
#   5) pgbackrest --stanza=turnflow check                  # verify archiving works
#
# Rollback (~30 min): remove these lines, restart db. archive_mode=off is a clean revert.

wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=turnflow archive-push %p'
archive_timeout = 60          # ship a partial WAL segment at least every 60s (bounds RPO when idle)
max_wal_senders = 5           # headroom for a future streaming standby
