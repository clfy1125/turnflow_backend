# GATE-0 / Layer 2 — enable WAL archiving for PITR. Reference values only.
#
# PREFERRED: apply via ALTER SYSTEM (writes postgresql.auto.conf inside PGDATA, so it
# survives both `restart` and `up --force-recreate` — no editing files in the volume):
#
#   # 0) Prereq: db image already has pgbackrest (deploy/backups/Dockerfile.db) and
#   #    /etc/pgbackrest/pgbackrest.conf is mounted + filled. (wal_level defaults to
#   #    'replica' and max_wal_senders to 10 on PG16 — no change needed.)
#   docker compose -f docker-compose.prod.yml exec db psql -U postgres -c \
#     "ALTER SYSTEM SET archive_command = 'pgbackrest --stanza=turnflow archive-push %p';"
#   docker compose -f docker-compose.prod.yml exec db psql -U postgres -c \
#     "ALTER SYSTEM SET archive_timeout = '60s';"
#   docker compose -f docker-compose.prod.yml exec db psql -U postgres -c \
#     "ALTER SYSTEM SET archive_mode = 'on';"   # archive_mode change requires a real restart:
#   docker compose -f docker-compose.prod.yml restart db
#   # then:  pgbackrest stanza-create -> check -> backup   (see DR_IMPLEMENTATION_PLAN.md §7)
#
# Rollback (~30s): ALTER SYSTEM SET archive_mode = 'off'; (+ RESET the others) then restart db.
#
# The equivalent postgresql.conf lines (if you prefer file-based config) are below.

wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=turnflow archive-push %p'
archive_timeout = 60          # ship a partial WAL segment at least every 60s (bounds RPO when idle)
max_wal_senders = 5           # headroom for a future streaming standby
