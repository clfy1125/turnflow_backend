<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="robots" content="noindex">
	<title>TurnFlow — 점검 중</title>
	<style>
		:root { color-scheme: light dark; }
		* { box-sizing: border-box; }
		body {
			margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
			background: #0f172a; color: #e2e8f0; padding: 24px;
		}
		.card {
			max-width: 480px; width: 100%; text-align: center;
			background: #1e293b; border: 1px solid #334155; border-radius: 16px;
			padding: 40px 32px; box-shadow: 0 10px 40px rgba(0,0,0,.3);
		}
		.dot { width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; display: inline-block; margin-right: 8px; animation: pulse 1.6s infinite; }
		@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
		h1 { font-size: 22px; margin: 16px 0 8px; }
		p { font-size: 15px; line-height: 1.6; color: #94a3b8; margin: 8px 0; }
		.brand { font-weight: 700; letter-spacing: .5px; color: #38bdf8; }
	</style>
</head>
<body>
	<main class="card">
		<div><span class="dot"></span><span class="brand">TurnFlow</span></div>
		<h1>잠시 점검 중입니다</h1>
		<p>서비스 복구 작업을 진행하고 있습니다.<br>몇 분 내로 자동으로 정상화됩니다.</p>
		<p>잠시 후 다시 시도해 주세요. 데이터는 안전하게 보관됩니다.</p>
	</main>
</body>
</html>
